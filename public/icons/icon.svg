<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Rounded Rect -->
  <rect width="512" height="512" rx="100" fill="url(#violetGrad)" />
  <!-- Internal Card Glow -->
  <rect x="30" y="30" width="452" height="452" rx="80" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="6" />
  
  <!-- Icon Graphics: A Checklist Symbol -->
  <g transform="translate(112, 112)" filter="url(#glow)">
    <!-- Checklist Frame -->
    <rect x="15" y="15" width="258" height="258" rx="30" fill="none" stroke="white" stroke-width="24" />
    <!-- Checkmark path -->
    <path d="M 75 140 L 125 190 L 215 90" fill="none" stroke="white" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
